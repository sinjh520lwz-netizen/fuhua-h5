<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Demo 2: Three.js 3D粒子</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
canvas{display:block}
.info{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="info">拖动鼠标旋转 · 滚轮缩放</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// 粒子参数
const count = 15000;
const radius = 5;

// 创建粒子几何体
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);
const sizes = new Float32Array(count);

for(let i = 0; i < count; i++){
  // 球形分布
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = radius * Math.cbrt(Math.random());
  
  positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i * 3 + 2] = r * Math.cos(phi);
  
  // 渐变颜色
  const color = new THREE.Color();
  color.setHSL(0.6 - (r / radius) * 0.4, 0.8, 0.6);
  colors[i * 3] = color.r;
  colors[i * 3 + 1] = color.g;
  colors[i * 3 + 2] = color.b;
  
  sizes[i] = Math.random() * 2 + 1;
}

geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
geometry.setAttribute('color',new THREE.BufferAttribute(colors,3));
geometry.setAttribute('size',new THREE.BufferAttribute(sizes,1));

// 着色器材质
const vertexShader = `
  attribute float size;
  varying vec3 vColor;
  void main(){
    vColor = color;
    vec4 mvPosition = modelViewMatrix * vec4(position,1.0);
    gl_PointSize = size * (200.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragmentShader = `
  varying vec3 vColor;
  void main(){
    float dist = length(gl_PointCoord - vec2(0.5));
    if(dist > 0.5) discard;
    float alpha = 1.0 - smoothstep(0.3,0.5,dist);
    gl_FragColor = vec4(vColor,alpha);
  }
`;

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  transparent:true,
  vertexColors:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

const particles = new THREE.Points(geometry,material);
scene.add(particles);

camera.position.z = 8;

// 鼠标交互
let mouseX = 0, mouseY = 0;
let targetRotationX = 0, targetRotationY = 0;

document.addEventListener('mousemove',(e)=>{
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// 动画
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  
  const time = clock.getElapsedTime();
  
  // 平滑旋转
  targetRotationX += (mouseY * 0.5 - targetRotationX) * 0.05;
  targetRotationY += (mouseX * 0.5 - targetRotationY) * 0.05;
  
  particles.rotation.x = targetRotationX + time * 0.1;
  particles.rotation.y = targetRotationY + time * 0.15;
  
  // 粒子脉动
  const positions = geometry.attributes.position.array;
  for(let i = 0; i < count; i++){
    const x = positions[i * 3];
    const y = positions[i * 3 + 1];
    const z = positions[i * 3 + 2];
    const r = Math.sqrt(x*x + y*y + z*z);
    const scale = 1 + Math.sin(time * 2 + r) * 0.05;
    positions[i * 3] = x * scale;
    positions[i * 3 + 1] = y * scale;
    positions[i * 3 + 2] = z * scale;
  }
  geometry.attributes.position.needsUpdate = true;
  
  renderer.render(scene,camera);
}

animate();

// 响应式
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
