<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Demo 3: 音频可视化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;color:#fff}
.container{text-align:center}
h1{font-size:28px;margin-bottom:8px;font-weight:700}
p{color:rgba(255,255,255,0.5);margin-bottom:40px}
.visualizer{display:flex;flex-direction:column;align-items:center;gap:40px}
.canvas-wrap{position:relative}
canvas{border-radius:20px;background:rgba(255,255,255,0.03)}
.btn{padding:16px 48px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px)}
.btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.05)}
.btn:active{transform:scale(0.95)}
.btn.playing{background:rgba(255,107,107,0.3);border-color:rgba(255,107,107,0.5)}
.info{margin-top:24px;font-size:13px;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div class="container">
  <h1>🎵 音频可视化</h1>
  <p>Web Audio API · 频谱分析</p>
  
  <div class="visualizer">
    <div class="canvas-wrap">
      <canvas id="spectrum" width="600" height="200"></canvas>
    </div>
    <div class="canvas-wrap">
      <canvas id="waveform" width="600" height="100"></canvas>
    </div>
    <div class="canvas-wrap">
      <canvas id="circle" width="300" height="300"></canvas>
    </div>
  </div>
  
  <button class="btn" id="playBtn" onclick="togglePlay()">▶ 播放音乐</button>
  <div class="info">点击播放按钮开始可视化</div>
</div>

<script>
let audioContext, analyser, source, isPlaying = false;
let animationId;

// 创建音频上下文
async function initAudio(){
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  
  // 加载音频
  const response = await fetch('https://cdn.jsdelivr.net/gh/nicholasgasior/gke-audio@master/audio/sample.mp3');
  const arrayBuffer = await response.arrayBuffer();
  const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
  
  source = audioContext.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  analyser.connect(audioContext.destination);
  source.loop = true;
}

async function togglePlay(){
  const btn = document.getElementById('playBtn');
  
  if(!isPlaying){
    if(!audioContext) await initAudio();
    source.start(0);
    isPlaying = true;
    btn.textContent = '⏸ 暂停';
    btn.classList.add('playing');
    draw();
  } else{
    source.stop();
    isPlaying = false;
    btn.textContent = '▶ 播放音乐';
    btn.classList.remove('playing');
    cancelAnimationFrame(animationId);
  }
}

function draw(){
  animationId = requestAnimationFrame(draw);
  
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  const timeArray = new Uint8Array(bufferLength);
  
  analyser.getByteFrequencyData(dataArray);
  analyser.getByteTimeDomainData(timeArray);
  
  // 频谱
  drawSpectrum(dataArray, bufferLength);
  
  // 波形
  drawWaveform(timeArray, bufferLength);
  
  // 圆形
  drawCircle(dataArray, bufferLength);
}

function drawSpectrum(data, length){
  const canvas = document.getElementById('spectrum');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  
  ctx.clearRect(0, 0, width, height);
  
  const barWidth = width / length * 2.5;
  let x = 0;
  
  for(let i = 0; i < length; i++){
    const barHeight = (data[i] / 255) * height;
    
    const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
    gradient.addColorStop(0, '#4ECDC4');
    gradient.addColorStop(1, '#FF6B6B');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);
    
    x += barWidth;
  }
}

function drawWaveform(data, length){
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  
  ctx.clearRect(0, 0, width, height);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#4ECDC4';
  ctx.beginPath();
  
  const sliceWidth = width / length;
  let x = 0;
  
  for(let i = 0; i < length; i++){
    const v = data[i] / 128.0;
    const y = v * height / 2;
    
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    
    x += sliceWidth;
  }
  
  ctx.lineTo(width, height / 2);
  ctx.stroke();
}

function drawCircle(data, length){
  const canvas = document.getElementById('circle');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  const centerX = width / 2;
  const centerY = height / 2;
  const radius = 80;
  
  ctx.clearRect(0, 0, width, height);
  
  // 背景圆
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // 频谱圆
  const bars = 64;
  const step = Math.floor(length / bars);
  
  for(let i = 0; i < bars; i++){
    const value = data[i * step] / 255;
    const barHeight = value * 60;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    
    const x1 = centerX + Math.cos(angle) * radius;
    const y1 = centerY + Math.sin(angle) * radius;
    const x2 = centerX + Math.cos(angle) * (radius + barHeight);
    const y2 = centerY + Math.sin(angle) * (radius + barHeight);
    
    const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
    gradient.addColorStop(0, '#4ECDC4');
    gradient.addColorStop(1, '#FF6B6B');
    
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  
  // 中心文字
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '24px -apple-system';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎵', centerX, centerY);
}
</script>
</body>
</html>
