<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Demo 5: GSAP动画展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;overflow-x:hidden}
.section{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px}
h1{font-size:48px;font-weight:700;margin-bottom:16px;letter-spacing:-1px}
h2{font-size:32px;font-weight:600;margin-bottom:12px}
p{font-size:18px;color:rgba(255,255,255,0.5);max-width:600px;text-align:center;line-height:1.6}
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.hero-title{opacity:0;transform:translateY(50px)}
.hero-subtitle{opacity:0;transform:translateY(30px)}
.hero-btn{margin-top:32px;padding:16px 40px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(20px);transition:all 0.3s}
.hero-btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.05)}

/* 滚动触发动画 */
.scroll-section{background:#0f0f23}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-top:40px}
.card{width:200px;height:250px;background:rgba(255,255,255,0.06);border-radius:20px;border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;opacity:0;transform:translateY(60px)}
.card-icon{font-size:48px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;margin-bottom:8px}
.card-desc{font-size:13px;color:rgba(255,255,255,0.5);text-align:center}

/* 文字动画 */
.text-section{background:#1a1a2e}
.animated-text{font-size:64px;font-weight:700;letter-spacing:-2px}
.char{display:inline-block;opacity:0;transform:translateY(100px) rotateX(90deg)}

/* SVG路径动画 */
.svg-section{background:#0f0f23}
.svg-wrap{margin-top:40px}
svg path{fill:none;stroke:#4ECDC4;stroke-width:2;stroke-dasharray:1000;stroke-dashoffset:1000}

/* 弹性动画 */
.bounce-section{background:#1a1a2e}
.bounce-items{display:flex;gap:40px;margin-top:40px}
.bounce-item{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px}
.bounce-1{background:#FF6B6B}
.bounce-2{background:#F7DC6F}
.bounce-3{background:#4ECDC4}
.bounce-4{background:#45B7D1}
.bounce-5{background:#96CEB4}
</style>
</head>
<body>

<!-- Hero动画 -->
<section class="section hero">
  <h1 class="hero-title">GSAP 动画</h1>
  <p class="hero-subtitle">专业级JavaScript动画库，让网页动起来</p>
  <button class="hero-btn">开始探索</button>
</section>

<!-- 滚动触发动画 -->
<section class="section scroll-section">
  <h2>滚动触发动画</h2>
  <p>向下滚动查看效果</p>
  <div class="cards">
    <div class="card">
      <div class="card-icon">🚀</div>
      <div class="card-title">高性能</div>
      <div class="card-desc">60fps流畅动画</div>
    </div>
    <div class="card">
      <div class="card-icon">🎯</div>
      <div class="card-title">精确控制</div>
      <div class="card-desc">帧级别控制</div>
    </div>
    <div class="card">
      <div class="card-icon">✨</div>
      <div class="card-title">丰富效果</div>
      <div class="card-desc">内置缓动函数</div>
    </div>
    <div class="card">
      <div class="card-icon">📱</div>
      <div class="card-title">响应式</div>
      <div class="card-desc">完美适配移动端</div>
    </div>
  </div>
</section>

<!-- 文字动画 -->
<section class="section text-section">
  <h2>文字动画</h2>
  <div class="animated-text" id="animatedText">HELLO WORLD</div>
</section>

<!-- SVG路径动画 -->
<section class="section svg-section">
  <h2>SVG路径动画</h2>
  <div class="svg-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <path d="M100,20 L180,180 L20,180 Z" />
    </svg>
  </div>
</section>

<!-- 弹性动画 -->
<section class="section bounce-section">
  <h2>弹性动画</h2>
  <div class="bounce-items">
    <div class="bounce-item bounce-1">🎨</div>
    <div class="bounce-item bounce-2">🎵</div>
    <div class="bounce-item bounce-3">🎬</div>
    <div class="bounce-item bounce-4">🎮</div>
    <div class="bounce-item bounce-5">📱</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
// 注册ScrollTrigger插件
gsap.registerPlugin(ScrollTrigger);

// Hero动画
gsap.timeline()
  .to('.hero-title', {
    opacity: 1,
    y: 0,
    duration: 1,
    ease: 'power3.out'
  })
  .to('.hero-subtitle', {
    opacity: 1,
    y: 0,
    duration: 0.8,
    ease: 'power3.out'
  }, '-=0.5')
  .to('.hero-btn', {
    opacity: 1,
    y: 0,
    duration: 0.6,
    ease: 'back.out(1.7)'
  }, '-=0.3');

// 滚动触发动画
gsap.utils.toArray('.card').forEach((card, i) => {
  gsap.to(card, {
    opacity: 1,
    y: 0,
    duration: 0.8,
    delay: i * 0.15,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: card,
      start: 'top 80%',
      toggleActions: 'play none none reverse'
    }
  });
});

// 文字动画 - 拆分字符
const text = document.getElementById('animatedText');
const chars = text.textContent.split('');
text.innerHTML = chars.map(char => `<span class="char">${char}</span>`).join('');

gsap.to('.char', {
  opacity: 1,
  y: 0,
  rotateX: 0,
  duration: 0.8,
  stagger: 0.05,
  ease: 'back.out(1.7)',
  scrollTrigger: {
    trigger: '.text-section',
    start: 'top 60%'
  }
});

// SVG路径动画
gsap.to('svg path', {
  strokeDashoffset: 0,
  duration: 2,
  ease: 'power2.inOut',
  scrollTrigger: {
    trigger: '.svg-section',
    start: 'top 60%'
  }
});

// 弹性动画
gsap.utils.toArray('.bounce-item').forEach((item, i) => {
  gsap.from(item, {
    scale: 0,
    opacity: 0,
    duration: 0.6,
    delay: i * 0.1,
    ease: 'elastic.out(1, 0.3)',
    scrollTrigger: {
      trigger: '.bounce-section',
      start: 'top 60%'
    }
  });
});

// 持续旋转动画
gsap.to('.bounce-item', {
  rotation: 360,
  duration: 2,
  stagger: 0.2,
  ease: 'none',
  repeat: -1,
  scrollTrigger: {
    trigger: '.bounce-section',
    start: 'top 60%'
  }
});
</script>
</body>
</html>
