<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>富华渔业 · 智慧管理</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: #e2e8f0;
  --blue: #3b82f6;
  --blue-light: #eff6ff;
  --green: #22c55e;
  --green-light: #f0fdf4;
  --red: #ef4444;
  --red-light: #fef2f2;
  --orange: #f59e0b;
  --orange-light: #fffbeb;
  --radius: 16px;
  --radius-sm: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  object-fit: cover;
}

.header-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header-time {
  font-size: 12px;
  color: var(--text3);
}

/* ===== Status Bar ===== */
.status-bar {
  display: flex;
  gap: 0;
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.status-item {
  flex: 1;
  text-align: center;
  position: relative;
}

.status-item:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 24px;
  background: var(--border);
}

.status-num {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
}

.status-num.warn { color: var(--red); }

.status-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

/* ===== Content ===== */
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.tab-page {
  display: none;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-page.active { display: block; }
.tab-page[data-tab="0"] { display: none; padding: 0; overflow: hidden; }
.tab-page[data-tab="0"].active { display: flex; flex-direction: column; }

/* ===== Map Tab ===== */
.map-container {
  flex: 1;
  position: relative;
  min-height: 0;
}

#map {
  width: 100%;
  height: 100%;
}

.map-search {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  z-index: 1000;
  display: flex;
  gap: 8px;
}

.map-search input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
  outline: none;
}

.map-search input:focus {
  box-shadow: 0 0 0 2px var(--blue), var(--shadow);
}

.map-btn {
  padding: 10px 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.map-btn.primary {
  background: var(--blue);
  color: white;
}

.map-btn.primary:active { opacity: 0.9; transform: scale(0.98); }

/* ===== Side Drawer ===== */
.drawer-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 500;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}

.drawer-overlay.open {
  opacity: 1;
  visibility: visible;
}

.drawer {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 80%;
  max-width: 340px;
  background: var(--card);
  z-index: 501;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}

.drawer.open { transform: translateX(0); }

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.drawer-title {
  font-size: 16px;
  font-weight: 600;
}

.drawer-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.drawer-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.drawer-tab {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid transparent;
  transition: all 0.2s;
}

.drawer-tab.active {
  background: var(--blue-light);
  color: var(--blue);
  border-color: var(--blue);
  font-weight: 500;
}

.drawer-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.drawer-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.drawer-item:active { background: var(--bg); }

.drawer-item-info {
  flex: 1;
  min-width: 0;
}

.drawer-item-name {
  font-size: 14px;
  font-weight: 500;
}

.drawer-item-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.drawer-item-btn {
  padding: 6px 12px;
  border: 1px solid var(--green);
  border-radius: 8px;
  font-size: 12px;
  color: var(--green);
  background: var(--green-light);
  cursor: pointer;
  white-space: nowrap;
}

.drawer-item-btn:active { opacity: 0.7; }

.drawer-item-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 8px;
}

.status-sailing { background: var(--blue-light); color: var(--blue); }
.status-moored { background: var(--green-light); color: var(--green); }
.status-offline { background: var(--bg); color: var(--text3); }
.status-warning { background: var(--red-light); color: var(--red); }

/* ===== Weather Tab ===== */
.weather-page {
  background: linear-gradient(180deg, #1e40af 0%, #3b82f6 30%, #93c5fd 60%, var(--bg) 100%);
}

.weather-hero {
  margin: 16px;
  padding: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}

.weather-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.weather-temp {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2px;
}

.weather-temp .unit {
  font-size: 24px;
  font-weight: 400;
  opacity: 0.7;
}

.weather-desc {
  font-size: 18px;
  font-weight: 600;
  margin-top: 4px;
}

.weather-range {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 2px;
}

.weather-feel {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 8px;
}

.weather-badge {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  background: rgba(255,255,255,0.2);
}

.weather-stats {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.8;
}

.weather-hourly {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 0 8px;
  margin: 0 -20px -20px;
  padding-left: 20px;
  padding-right: 20px;
}

.weather-hourly::-webkit-scrollbar { display: none; }

.hourly-list {
  display: flex;
  gap: 0;
}

.hourly-item {
  flex: 0 0 64px;
  text-align: center;
  padding: 8px 4px;
  border-radius: 12px;
  transition: background 0.2s;
}

.hourly-item.now {
  background: rgba(255,255,255,0.15);
}

.hourly-time {
  font-size: 11px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.hourly-icon {
  font-size: 18px;
  margin: 4px 0;
}

.hourly-temp {
  font-size: 14px;
  font-weight: 600;
}

.hourly-wind {
  font-size: 10px;
  opacity: 0.5;
  margin-top: 2px;
}

/* Sailing Advice */
.sailing-advice {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  margin: 16px;
  border-radius: var(--radius-sm);
  background: var(--green-light);
  border: 1px solid #bbf7d0;
}

.sailing-advice.warn {
  background: var(--orange-light);
  border-color: #fde68a;
}

.sailing-advice.danger {
  background: var(--red-light);
  border-color: #fecaca;
}

.sailing-icon { font-size: 32px; }

.sailing-title {
  font-size: 15px;
  font-weight: 700;
  color: #166534;
}

.sailing-advice.warn .sailing-title { color: #92400e; }
.sailing-advice.danger .sailing-title { color: #991b1b; }

.sailing-detail {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

/* Marine Section */
.marine-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  margin: 0 16px 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.marine-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

.marine-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.marine-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  border: 1px solid var(--border);
}

.marine-icon {
  font-size: 20px;
  margin-bottom: 4px;
}

.marine-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}

.marine-value {
  font-size: 16px;
  font-weight: 700;
}

.marine-sub {
  font-size: 10px;
  color: var(--text2);
  margin-top: 2px;
}

/* ===== Announcement Tab ===== */
.announcement-list {
  padding: 12px 16px;
}

.announcement-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}

.announcement-card:active { transform: scale(0.98); }

.announcement-card.urgent { border-left: 4px solid var(--red); }

.announcement-header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.announcement-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 500;
  flex-shrink: 0;
}

.tag-weather { background: var(--blue-light); color: var(--blue); }
.tag-typhoon { background: var(--red-light); color: var(--red); }
.tag-fishing { background: var(--orange-light); color: var(--orange); }
.tag-notice { background: var(--bg); color: var(--text2); }

.announcement-title {
  font-size: 15px;
  font-weight: 500;
  flex: 1;
}

.announcement-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}

.announcement-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
}

.announcement-body.open {
  max-height: 500px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ===== Archive Tab ===== */
.archive-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.archive-search {
  flex: 1;
}

.archive-search input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  outline: none;
  transition: all 0.2s;
}

.archive-search input:focus {
  border-color: var(--blue);
  background: white;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.archive-btn {
  padding: 10px 14px;
  border: 1px solid var(--blue);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--blue);
  background: white;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.archive-btn:active { opacity: 0.7; }

.archive-btn.active {
  background: var(--blue);
  color: white;
}

.archive-list {
  padding: 12px 16px;
}

.archive-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}

.archive-card:active { transform: scale(0.98); }

.archive-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.archive-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-ok { background: var(--green); }
.dot-warning { background: var(--orange); }
.dot-expired { background: var(--red); }

.archive-name {
  font-size: 15px;
  font-weight: 500;
}

.archive-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.archive-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  font-size: 14px;
}

.archive-detail.open {
  max-height: 500px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.archive-row {
  display: flex;
  margin-bottom: 8px;
}

.archive-label {
  color: var(--text2);
  min-width: 80px;
  flex-shrink: 0;
}

.archive-value {
  color: var(--text);
}

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9999;
  justify-content: center;
  align-items: flex-end;
}

.modal-overlay.show { display: flex; }

.modal-content {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 75vh;
  overflow-y: auto;
  padding: 20px 20px 30px;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-drag {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin: 0 auto 16px;
}

.modal-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
}

.modal-field {
  display: flex;
  margin-bottom: 12px;
}

.modal-label {
  color: var(--text2);
  font-size: 14px;
  min-width: 80px;
  flex-shrink: 0;
}

.modal-value {
  font-size: 14px;
}

.modal-tel {
  color: var(--blue);
  font-weight: 500;
  text-decoration: none;
}

/* ===== Bottom Nav ===== */
.bottom-nav {
  display: flex;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  flex-shrink: 0;
}

.nav-btn {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.nav-btn .icon {
  font-size: 22px;
  display: block;
  margin-bottom: 2px;
}

.nav-btn .label {
  font-size: 11px;
  color: var(--text3);
}

.nav-btn.active .label {
  color: var(--blue);
  font-weight: 500;
}

/* ===== Baobao Modal ===== */
.baobao-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.baobao-tab {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.baobao-tab.active {
  background: var(--blue-light);
  color: var(--blue);
  border-color: var(--blue);
  font-weight: 500;
}

.baobao-list {
  max-height: 50vh;
  overflow-y: auto;
}

.baobao-item {
  display: flex;
  align-items: center;
  padding: 12px;
  cursor: pointer;
  border-radius: 10px;
  transition: background 0.15s;
}

.baobao-item:active { background: var(--bg); }

.baobao-name {
  font-size: 15px;
  font-weight: 500;
  flex: 1;
}

.baobao-count {
  font-size: 13px;
  color: var(--text3);
}

.baobao-arrow {
  font-size: 16px;
  color: var(--text3);
  margin-left: 8px;
}

/* ===== Loading ===== */
.loading {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
  gap: 6px;
}

.loading span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text3);
  animation: dotPulse 1.2s ease-in-out infinite;
}

.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* ===== Leaflet ===== */
.custom-popup .leaflet-popup-content-wrapper {
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 0;
}

.custom-popup .leaflet-popup-content {
  margin: 12px 16px;
  font-size: 14px;
  line-height: 1.5;
}

.popup-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}

.popup-row {
  color: var(--text2);
  font-size: 13px;
}

.popup-tel {
  color: var(--blue);
  font-weight: 500;
}

.popup-btn {
  background: var(--bg);
  color: var(--text);
  text-align: center;
  padding: 8px 12px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  border: 1px solid var(--border);
}

.popup-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="/logo.jpg" class="header-logo" alt="logo">
      <div>
        <div class="header-title">富华渔业</div>
        <div class="header-time" id="refreshTime"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar"></div>

  <!-- Content -->
  <div class="content">
    <!-- Tab 0: 船位 -->
    <div class="tab-page active" data-tab="0">
      <div class="map-container">
        <div class="map-search">
          <input type="text" id="posSearch" placeholder="搜索船名...">
          <button class="map-btn primary" id="posDrawerBtn">我的船</button>
        </div>
        <div id="map"></div>
      </div>
      <div class="drawer-overlay" id="drawerOverlay"></div>
      <div class="drawer" id="drawer">
        <div class="drawer-header">
          <span class="drawer-title">我的包保船</span>
          <button class="drawer-close" id="drawerClose">✕</button>
        </div>
        <div class="drawer-tabs" id="drawerTabs">
          <span class="drawer-tab active" data-level="company">公司</span>
          <span class="drawer-tab" data-level="law">执法</span>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

/* ===== Config ===== */
const API_BASE = '/api';
const SOUTH_SEA_NAMES = ['桂北渔65788','桂北渔65828','桂北渔65886','桂北渔65888','桂北渔65889'];
const MAP_CENTER = [21.45, 109.12];
const MAP_ZOOM = 12;
const TILE_URL = 'https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}';
const REFRESH_INTERVAL = 300000;

/* ===== State ===== */
let positions = [], ships = [], announcements = [];
let map = null, markers = null, currentTab = 0;
let lastRefresh = 0;
let baobaoFilter = null;

/* ===== Utils ===== */
const $ = id => document.getElementById(id);
const isSouthSea = name => SOUTH_SEA_NAMES.includes(name);
const isOffline = p => (Date.now()/1000 - p.postime) > 86400;
const isIllegal = p => {
  if(!p.speed || p.speed < 0.5) return false;
  if(isOffline(p) || isSouthSea(p.shipName) || p.isSouthSea) return false;
  return isMoriSeason();
};
function isMoriSeason(){
  const m = new Date().getMonth()+1, d = new Date().getDate();
  return (m===5 && d>=1) || (m>=6 && m<=7) || (m===8 && d<=16);
}
function toDateStr(ts){
  const d = new Date(ts*1000);
  return (d.getMonth()+1)+'月'+d.getDate()+'日 '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function pad(n){ return n<10?'0'+n:''+n; }
function escapeHtml(s){
  const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;
}
function showLoading(el){
  el.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';
}
function showEmpty(el,msg){
  el.innerHTML='<div class="empty-state">'+escapeHtml(msg||'暂无内容')+'</div>';
}

/* ===== WGS84 to GCJ02 ===== */
function wgs84ToGcj02(lng,lat){
  const PI=3.14159265358979324,a=6378245.0,ee=0.00669342162296594323;
  function outOfChina(lng,lat){return lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271}
  function transformLat(x,y){let ret=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));ret+=20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI);ret+=20*Math.sin(y*PI)+40*Math.sin(y/3*PI);ret+=160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30);return ret}
  function transformLng(x,y){let ret=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));ret+=20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI);ret+=20*Math.sin(x*PI)+40*Math.sin(x/3*PI);ret+=150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI);return ret}
  if(outOfChina(lng,lat))return[lat,lng];
  let dLat=transformLat(lng-105,lat-35),dLng=transformLng(lng-105,lat-35);
  const radLat=lat/180*PI,magic=Math.sin(radLat);
  const sqrtMagic=Math.sqrt(1-ee*magic*magic);
  dLat=(dLat*180)/((a*(1-ee))/(1-ee*magic*magic)*sqrtMagic*PI);
  dLng=(dLng*180)/(a/sqrtMagic*Math.cos(radLat)*PI);
  return[lat+dLat,lng+dLng]
}

/* ===== Modal ===== */
const modal = $('modal'), modalContent = $('modalContent');
function openModal(html){
  $('modalBody').innerHTML = html;
  modal.classList.add('show');
}
function closeModal(){ modal.classList.remove('show'); }
modal.addEventListener('click', e => { if(e.target===modal) closeModal(); });

let modalTouchStartY = 0, modalTouchMoveY = 0, modalDragging = false;
modalContent.addEventListener('touchstart', e => {
  if(modalContent.scrollTop <= 2){
    modalTouchStartY = e.touches[0].clientY;
    modalDragging = true;
  }
}, {passive:true});
modalContent.addEventListener('touchmove', e => {
  if(!modalDragging) return;
  modalTouchMoveY = e.touches[0].clientY - modalTouchStartY;
  if(modalTouchMoveY > 0) modalContent.style.transform = 'translateY('+modalTouchMoveY+'px)';
}, {passive:true});
modalContent.addEventListener('touchend', () => {
  modalDragging = false;
  modalContent.style.transform = '';
  if(modalTouchMoveY > 80) closeModal();
  modalTouchMoveY = 0;
}, {passive:true});

/* ===== Tab Switching ===== */
function switchTab(idx){
  currentTab = idx;
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-page[data-tab="'+idx+'"]').classList.add('active');
  document.querySelector('.nav-btn[data-tab="'+idx+'"]').classList.add('active');
  
  if(idx === 0 && !map) initMap();
  if(idx === 1) loadWeather();
  if(idx === 2) loadAnnouncements();
  if(idx === 3) loadArchive();
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(parseInt(btn.dataset.tab)));
});

/* ===== Map ===== */
function initMap(){
  map = L.map('map').setView(MAP_CENTER, MAP_ZOOM);
  L.tileLayer(TILE_URL, {attribution: '&copy; 高德地图'}).addTo(map);
  markers = L.layerGroup().addTo(map);
  loadPositions();
}

function getShipStatus(p){
  if(isIllegal(p)) return {text:'⚠违规', cls:'status-warning'};
  if(isOffline(p)) return {text:'离线', cls:'status-offline'};
  if(p.speed && p.speed > 0.5) return {text:'航行', cls:'status-sailing'};
  return {text:'停泊', cls:'status-moored'};
}

function renderMarkers(){
  markers.clearLayers();
  positions.forEach(p => {
    if(!p.lat || !p.lng) return;
    const [lat, lng] = wgs84ToGcj02(p.lng, p.lat);
    const status = getShipStatus(p);
    const icon = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:'+(status.cls==='status-warning'?'#ef4444':status.cls==='status-sailing'?'#3b82f6':'#64748b')+';color:white;padding:2px 6px;border-radius:4px;font-size:11px;white-space:nowrap">'+escapeHtml(p.shipName)+'</div>',
      iconAnchor: [30, 15]
    });
    const marker = L.marker([lat, lng], {icon}).addTo(markers);
    marker.bindPopup(`
      <div class="popup-title">${escapeHtml(p.shipName)}</div>
      <div class="popup-row">状态: ${status.text}</div>
      <div class="popup-row">速度: ${p.speed||0}节</div>
      <div class="popup-row">时间: ${toDateStr(p.postime)}</div>
      ${p.tel ? '<div class="popup-row">电话: <a class="popup-tel" href="tel:'+p.tel+'">'+p.tel+'</a></div>' : ''}
      <div class="popup-btn" onclick="showShipDetail('${p.shipName}')">查看详情</div>
    `, {maxWidth: 200});
  });
}

function showShipDetail(name){
  const ship = ships.find(s => s.shipName === name);
  if(!ship) return;
  openModal(`
    <div class="modal-title">${escapeHtml(ship.shipName)}</div>
    <div class="modal-field"><span class="modal-label">持证人</span><span class="modal-value">${escapeHtml(ship.owner||'--')}</span></div>
    <div class="modal-field"><span class="modal-label">电话</span><span class="modal-value"><a class="modal-tel" href="tel:${ship.tel}">${ship.tel||'--'}</a></span></div>
    <div class="modal-field"><span class="modal-label">地址</span><span class="modal-value">${escapeHtml(ship.address||'--')}</span></div>
    <div class="modal-field"><span class="modal-label">功率</span><span class="modal-value">${ship.power||'--'}千瓦</span></div>
    <div class="modal-field"><span class="modal-label">船长</span><span class="modal-value">${ship.length||'--'}米</span></div>
    <div class="modal-field"><span class="modal-label">材质</span><span class="modal-value">${escapeHtml(ship.hullMaterial||'--')}</span></div>
    <div class="modal-field"><span class="modal-label">年检</span><span class="modal-value">${ship.annualInspect||'--'}</span></div>
  `);
}

/* ===== Position Search ===== */
$('posSearch').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  if(!q){ renderMarkers(); return; }
  markers.clearLayers();
  positions.filter(p => p.shipName.toLowerCase().includes(q)).forEach(p => {
    if(!p.lat || !p.lng) return;
    const [lat, lng] = wgs84ToGcj02(p.lng, p.lat);
    const status = getShipStatus(p);
    const icon = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:#3b82f6;color:white;padding:2px 6px;border-radius:4px;font-size:11px">'+escapeHtml(p.shipName)+'</div>',
      iconAnchor: [30, 15]
    });
    L.marker([lat, lng], {icon}).addTo(markers);
  });
});

/* ===== Drawer ===== */
const drawer = $('drawer'), drawerOverlay = $('drawerOverlay');
function openDrawer(){ drawer.classList.add('open'); drawerOverlay.classList.add('open'); }
function closeDrawer(){ drawer.classList.remove('open'); drawerOverlay.classList.remove('open'); }

$('posDrawerBtn').addEventListener('click', () => { openDrawer(); loadDrawerShips(); });
$('drawerClose').addEventListener('click', closeDrawer);
drawerOverlay.addEventListener('click', closeDrawer);

document.querySelectorAll('.drawer-tab').forEach(tab => {
  tab.addEventListener('click', function(){
    document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    loadDrawerShips();
  });
});

function loadDrawerShips(){
  const level = document.querySelector('.drawer-tab.active').dataset.level;
  const body = $('drawerBody');
  showLoading(body);
  
  fetch(API_BASE+'/baobao?level='+level)
    .then(r => r.json())
    .then(data => {
      if(!data.data || !data.data.length){
        showEmpty(body, '暂无包保船');
        return;
      }
      body.innerHTML = data.data.map(item => `
        <div class="drawer-item" onclick="filterByBaobao('${escapeHtml(item.name)}','${level}')">
          <div class="drawer-item-info">
            <div class="drawer-item-name">${escapeHtml(item.name)}</div>
            <div class="drawer-item-meta">${item.count}艘船</div>
          </div>
          <span class="baobao-arrow">›</span>
        </div>
      `).join('');
    })
    .catch(() => showEmpty(body, '加载失败'));
}

function filterByBaobao(name, level){
  baobaoFilter = {name, level};
  closeDrawer();
  renderMarkers();
  // Filter markers by baobao
  markers.clearLayers();
  const filtered = positions.filter(p => {
    const ship = ships.find(s => s.shipName === p.shipName);
    if(!ship) return false;
    if(level==='company') return ship.baobaoCompany === name;
    if(level==='law') return ship.baobaoLaw === name;
    if(level==='town') return ship.baobaoTown === name;
    return false;
  });
  filtered.forEach(p => {
    if(!p.lat || !p.lng) return;
    const [lat, lng] = wgs84ToGcj02(p.lng, p.lat);
    const status = getShipStatus(p);
    const icon = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:'+(status.cls==='status-warning'?'#ef4444':status.cls==='status-sailing'?'#3b82f6':'#64748b')+';color:white;padding:2px 6px;border-radius:4px;font-size:11px">'+escapeHtml(p.shipName)+'</div>',
      iconAnchor: [30, 15]
    });
    L.marker([lat, lng], {icon}).addTo(markers);
  });
}

/* ===== Data Loading ===== */
async function loadPositions(){
  try{
    const [posRes, shipRes] = await Promise.all([
      fetch(API_BASE+'/positions'),
      fetch(API_BASE+'/ships')
    ]);
    const posData = await posRes.json();
    const shipData = await shipRes.json();
    
    positions = posData.data || [];
    ships = shipData.data || [];
    
    renderMarkers();
    updateStatusBar();
    updateRefreshTime();
  }catch(e){
    console.error('Load failed:', e);
  }
}

function updateStatusBar(){
  let sailing=0, moored=0, offline=0, warning=0;
  positions.forEach(p => {
    if(isIllegal(p)) warning++;
    else if(isOffline(p)) offline++;
    else if(p.speed && p.speed > 0.5) sailing++;
    else moored++;
  });
  
  $('statusBar').innerHTML = `
    <div class="status-item"><div class="status-num">${sailing}</div><div class="status-label">航行</div></div>
    <div class="status-item"><div class="status-num">${moored}</div><div class="status-label">停泊</div></div>
    <div class="status-item"><div class="status-num">${offline}</div><div class="status-label">离线</div></div>
    <div class="status-item"><div class="status-num warn">${warning}</div><div class="status-label">⚠违规</div></div>
  `;
}

function updateRefreshTime(){
  const now = new Date();
  $('refreshTime').textContent = pad(now.getHours())+':'+pad(now.getMinutes());
}

/* ===== Weather ===== */
async function loadWeather(){
  try{
    const res = await fetch(API_BASE+'/weather');
    const data = await res.json();
    if(!data.data) return;
    
    const w = data.data;
    $('wtDesc').textContent = w.description || '--';
    $('wtTemp').textContent = w.temp || '--';
    $('wtRange').textContent = (w.tempMin||'--')+'/'+(w.tempMax||'--')+'°C';
    $('wtFeel').textContent = w.feelsLike || '--';
    $('wtAqi').textContent = w.aqiDesc || '优';
    $('wtWind').textContent = w.windSpeed||'--';
    $('wtHumidity').textContent = w.humidity||'--';
    
    // Hourly
    if(w.hourly){
      $('hourlyList').innerHTML = w.hourly.map((h,i) => `
        <div class="hourly-item ${i===0?'now':''}">
          <div class="hourly-time">${i===0?'现在':h.time}</div>
          <div class="hourly-icon">${h.icon||'🌤'}</div>
          <div class="hourly-temp">${h.temp}°</div>
          <div class="hourly-wind">${h.wind||''}</div>
        </div>
      `).join('');
    }
    
    // Sailing advice
    const advice = $('sailingAdvice');
    if(w.sailingAdvice){
      const a = w.sailingAdvice;
      $('sailingIcon').textContent = a.icon || '🟢';
      $('sailingTitle').textContent = a.title || '--';
      $('sailingDetail').textContent = a.detail || '--';
      advice.className = 'sailing-advice '+(a.level||'');
    }
    
    // Marine
    if(w.marine){
      const m = w.marine;
      $('mcWind').textContent = m.windSpeed||'--';
      $('mcWindDir').textContent = m.windDir||'--';
      $('mcWave').textContent = m.waveHeight||'--';
      $('mcSwell').textContent = m.swell||'--';
      $('mcVis').textContent = m.visibility||'--';
      $('mcVisDesc').textContent = m.visDesc||'--';
      $('mcPressure').textContent = m.pressure||'--';
      $('mcPressureTrend').textContent = m.pressureTrend||'--';
      $('mcCloud').textContent = m.cloud||'--';
      $('mcCloudDesc').textContent = m.cloudDesc||'--';
      $('mcHumidity').textContent = m.humidity||'--';
      $('mcHumidityDesc').textContent = m.humidityDesc||'--';
    }
  }catch(e){
    console.error('Weather load failed:', e);
  }
}

/* ===== Announcements ===== */
async function loadAnnouncements(){
  const list = $('announcementList');
  showLoading(list);
  
  try{
    const res = await fetch(API_BASE+'/announcements');
    const data = await res.json();
    announcements = data.data || [];
    
    if(!announcements.length){
      showEmpty(list, '暂无公告');
      return;
    }
    
    list.innerHTML = announcements.map((a,i) => {
      const typeClass = a.type==='台风'?'tag-typhoon':a.type==='天气'?'tag-weather':a.type==='休渔'?'tag-fishing':'tag-notice';
      return `
        <div class="announcement-card ${a.urgent?'urgent':''}" onclick="toggleAnnouncement(${i})">
          <div class="announcement-header">
            <span class="announcement-tag ${typeClass}">${escapeHtml(a.type||'通知')}</span>
            <span class="announcement-title">${escapeHtml(a.title)}</span>
          </div>
          <div class="announcement-meta">${escapeHtml(a.time||'')}</div>
          <div class="announcement-body" id="annBody${i}">${escapeHtml(a.content||'')}</div>
        </div>
      `;
    }).join('');
  }catch(e){
    showEmpty(list, '加载失败');
  }
}

function toggleAnnouncement(i){
  const body = document.getElementById('annBody'+i);
  body.classList.toggle('open');
}

/* ===== Archive ===== */
let archiveFilter = null;

$('myShipBtn').addEventListener('click', function(){
  if(archiveFilter){
    archiveFilter = null;
    this.classList.remove('active');
  }else{
    archiveFilter = 'mine';
    this.classList.add('active');
  }
  loadArchive();
});

$('shipSearch').addEventListener('input', function(){
  loadArchive();
});

async function loadArchive(){
  const list = $('archiveList');
  showLoading(list);
  
  try{
    const res = await fetch(API_BASE+'/ships');
    const data = await res.json();
    let shipList = data.data || [];
    
    // Filter
    const q = $('shipSearch').value.trim().toLowerCase();
    if(q){
      shipList = shipList.filter(s => 
        s.shipName.toLowerCase().includes(q) || 
        (s.owner||'').toLowerCase().includes(q)
      );
    }
    
    if(archiveFilter === 'mine'){
      // Filter by current user's baobao
      // This would need user context, for now show all
    }
    
    if(!shipList.length){
      showEmpty(list, '未找到船舶');
      return;
    }
    
    list.innerHTML = shipList.map((s,i) => {
      const insp = getInspectStatus(s);
      return `
        <div class="archive-card" onclick="toggleArchive(${i})">
          <div class="archive-top">
            <div class="archive-dot ${insp.cls}"></div>
            <div>
              <div class="archive-name">${escapeHtml(s.shipName)}</div>
              <div class="archive-sub">${escapeHtml(s.owner||'')} · ${escapeHtml(s.hullMaterial||'')} · ${s.power||0}千瓦</div>
            </div>
          </div>
          <div class="archive-detail" id="archDetail${i}">
            <div class="archive-row"><span class="archive-label">持证人</span><span class="archive-value">${escapeHtml(s.owner||'--')}</span></div>
            <div class="archive-row"><span class="archive-label">电话</span><span class="archive-value"><a class="modal-tel" href="tel:${s.tel}">${s.tel||'--'}</a></span></div>
            <div class="archive-row"><span class="archive-label">地址</span><span class="archive-value">${escapeHtml(s.address||'--')}</span></div>
            <div class="archive-row"><span class="archive-label">功率</span><span class="archive-value">${s.power||'--'}千瓦</span></div>
            <div class="archive-row"><span class="archive-label">船长</span><span class="archive-value">${s.length||'--'}米</span></div>
            <div class="archive-row"><span class="archive-label">材质</span><span class="archive-value">${escapeHtml(s.hullMaterial||'--')}</span></div>
            <div class="archive-row"><span class="archive-label">年检</span><span class="archive-value">${s.annualInspect||'--'} (${insp.label})</span></div>
            <div class="archive-row"><span class="archive-label">包保公司</span><span class="archive-value">${escapeHtml(s.baobaoCompany||'--')}</span></div>
            <div class="archive-row"><span class="archive-label">包保执法</span><span class="archive-value">${escapeHtml(s.baobaoLaw||'--')}</span></div>
          </div>
        </div>
      `;
    }).join('');
  }catch(e){
    showEmpty(list, '加载失败');
  }
}

function toggleArchive(i){
  const detail = document.getElementById('archDetail'+i);
  detail.classList.toggle('open');
}

function getInspectStatus(s){
  const lastInsp = parseInspect(s.annualInspect);
  if(!lastInsp) return {label:'未知', cls:'dot-ok'};
  const now = new Date();
  const hull = s.hullMaterial || '';
  const buildDate = parseInspect(s.buildDate);
  let age = buildDate ? now.getFullYear() - buildDate.getFullYear() : 0;
  
  let validityYears = 5;
  if(hull === '木质'){
    if(age >= 20) validityYears = 1;
    else if(age >= 13) validityYears = 2;
  }else if(hull === '钢质'){
    if(age >= 21) validityYears = 1;
    else if(age >= 16) validityYears = 2;
  }
  
  const expiry = new Date(lastInsp);
  expiry.setFullYear(expiry.getFullYear() + validityYears);
  const diffDays = Math.floor((expiry.getTime()-now.getTime())/(86400000));
  
  if(diffDays < 0) return {label:'已过期'+Math.abs(diffDays)+'天', cls:'dot-expired'};
  if(diffDays <= 30) return {label:diffDays+'天后到期', cls:'dot-warning'};
  return {label:'正常', cls:'dot-ok'};
}

function parseInspect(str){
  if(!str) return null;
  str = String(str).trim();
  if(str.includes('年')){
    const m = str.match(/(\d+)年(\d+)?月?(\d+)?/);
    if(m) return new Date(parseInt(m[1]), parseInt(m[2]||'1')-1, parseInt(m[3]||'1'));
  }
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

setInterval(() => {
  if(Date.now() - lastRefresh > REFRESH_INTERVAL){
    loadPositions();
    if(currentTab === 1) loadWeather();
  }
}, 60000);

/* ===== Init ===== */
initMap();
updateRefreshTime();
