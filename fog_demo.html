<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>大雾效果测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #000;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.test-card {
  width: 360px;
  height: 480px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
}

.card-bg {
  position: absolute;
  inset: 0;
  background-image: url('/h5/images/weather/foggy.jpg');
  background-size: cover;
  background-position: center;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
  z-index: 2;
}

.card-content {
  position: relative;
  z-index: 10;
  height: 100%;
  padding: 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  color: white;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.card-temp {
  font-size: 88px;
  font-weight: 200;
  line-height: 1;
  letter-spacing: -3px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.card-temp .degree {
  font-size: 44px;
  vertical-align: top;
  margin-left: -6px;
}

.card-status {
  font-size: 20px;
  font-weight: 500;
  margin-top: 10px;
  text-shadow: 0 1px 10px rgba(0,0,0,0.5);
}

.card-icon {
  font-size: 56px;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
}

.card-quote {
  font-size: 16px;
  font-style: italic;
  text-align: center;
  opacity: 0.9;
  line-height: 1.7;
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  font-weight: 300;
}

.card-stats {
  display: flex;
  justify-content: space-around;
  padding: 18px;
  background: rgba(0,0,0,0.35);
  border-radius: 18px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.stat-item { text-align: center; }
.stat-value {
  font-size: 18px;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.stat-label {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.title {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 20px;
  font-weight: 600;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="title">🌫️ 大雾效果 - 重新设计</div>

<div class="test-card">
  <div class="card-bg"></div>
  <canvas id="fog-canvas"></canvas>
  <div class="card-overlay"></div>
  <div class="card-content">
    <div class="card-top">
      <div>
        <div class="card-temp">12<span class="degree">°</span></div>
        <div class="card-status">Foggy</div>
      </div>
      <div class="card-icon">🌫️</div>
    </div>
    <div class="card-quote">"Fog is just clouds that have lost their way."</div>
    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-value">12°</div>
        <div class="stat-label">Feels Like</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">88%</div>
        <div class="stat-label">Humidity</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">2 km</div>
        <div class="stat-label">Visibility</div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('fog-canvas');
const ctx = canvas.getContext('2d');

// 设置canvas尺寸
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);
  return { w: rect.width, h: rect.height };
}

const { w, h } = resize();

// 雾气层级 - 多层叠加产生深度感
const fogLayers = [
  { y: h * 0.3, height: h * 0.5, speed: 0.3, opacity: 0.15, scale: 1.2 },
  { y: h * 0.4, height: h * 0.4, speed: 0.5, opacity: 0.2, scale: 1.0 },
  { y: h * 0.5, height: h * 0.3, speed: 0.7, opacity: 0.25, scale: 0.8 },
  { y: h * 0.6, height: h * 0.25, speed: 0.4, opacity: 0.3, scale: 0.6 }
];

// 雾气团 - 不规则形状
class FogCloud {
  constructor(layer) {
    this.layer = layer;
    this.x = Math.random() * w * 1.5 - w * 0.25;
    this.y = layer.y + Math.random() * layer.height;
    this.width = 150 + Math.random() * 200;
    this.height = 60 + Math.random() * 80;
    this.speed = layer.speed * (0.8 + Math.random() * 0.4);
    this.opacity = layer.opacity * (0.7 + Math.random() * 0.3);
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.01 + Math.random() * 0.02;
    this.wobbleAmount = 5 + Math.random() * 10;
  }
  
  update() {
    this.x += this.speed;
    this.wobble += this.wobbleSpeed;
    this.y += Math.sin(this.wobble) * 0.3;
    
    if (this.x > w + this.width) {
      this.x = -this.width;
      this.y = this.layer.y + Math.random() * this.layer.height;
    }
  }
  
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    
    // 使用贝塞尔曲线绘制不规则雾气形状
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    
    // 上边缘 - 不规则
    ctx.bezierCurveTo(
      this.x + this.width * 0.25, this.y - this.height * 0.3,
      this.x + this.width * 0.5, this.y - this.height * 0.2,
      this.x + this.width * 0.75, this.y - this.height * 0.1
    );
    ctx.bezierCurveTo(
      this.x + this.width * 0.9, this.y,
      this.x + this.width, this.y + this.height * 0.2,
      this.x + this.width, this.y + this.height * 0.4
    );
    
    // 下边缘 - 不规则
    ctx.bezierCurveTo(
      this.x + this.width * 0.9, this.y + this.height * 0.6,
      this.x + this.width * 0.7, this.y + this.height * 0.8,
      this.x + this.width * 0.5, this.y + this.height
    );
    ctx.bezierCurveTo(
      this.x + this.width * 0.3, this.y + this.height * 0.9,
      this.x + this.width * 0.1, this.y + this.height * 0.7,
      this.x, this.y + this.height * 0.5
    );
    
    ctx.closePath();
    
    // 渐变填充 - 边缘更透明
    const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y);
    gradient.addColorStop(0, 'rgba(200, 200, 210, 0)');
    gradient.addColorStop(0.3, 'rgba(200, 200, 210, 0.8)');
    gradient.addColorStop(0.7, 'rgba(200, 200, 210, 0.8)');
    gradient.addColorStop(1, 'rgba(200, 200, 210, 0)');
    ctx.fillStyle = gradient;
    ctx.fill();
    
    ctx.restore();
  }
}

// 创建雾气团
const fogClouds = [];
fogLayers.forEach(layer => {
  const count = Math.floor(3 + Math.random() * 3);
  for (let i = 0; i < count; i++) {
    fogClouds.push(new FogCloud(layer));
  }
});

// 底部雾气 - 更浓
const groundFog = {
  y: h * 0.7,
  height: h * 0.3,
  opacity: 0.4
};

// 动画循环
function animate() {
  ctx.clearRect(0, 0, w, h);
  
  // 绘制底部浓雾
  const groundGradient = ctx.createLinearGradient(0, groundFog.y, 0, h);
  groundGradient.addColorStop(0, 'rgba(180, 180, 190, 0)');
  groundGradient.addColorStop(0.3, `rgba(180, 180, 190, ${groundFog.opacity * 0.5})`);
  groundGradient.addColorStop(1, `rgba(180, 180, 190, ${groundFog.opacity})`);
  ctx.fillStyle = groundGradient;
  ctx.fillRect(0, groundFog.y, w, groundFog.height);
  
  // 更新和绘制雾气团
  fogClouds.forEach(cloud => {
    cloud.update();
    cloud.draw(ctx);
  });
  
  // 添加顶部薄雾
  const topGradient = ctx.createLinearGradient(0, 0, 0, h * 0.3);
  topGradient.addColorStop(0, 'rgba(200, 200, 210, 0.1)');
  topGradient.addColorStop(1, 'rgba(200, 200, 210, 0)');
  ctx.fillStyle = topGradient;
  ctx.fillRect(0, 0, w, h * 0.3);
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
