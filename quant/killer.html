<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>JH 杀手策略</title>
<style>
:root{--bg:#f2f2f7;--card:rgba(255,255,255,.9);--text:#1d1d1f;--text2:#86868b;--red:#ff3b30;--green:#34c759;--blue:#007aff;--orange:#ff9500;--purple:#af52de;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
.header{padding:18px 20px 8px;background:rgba(255,255,255,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.3);position:sticky;top:0;z-index:200}
.header h1{font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.header .sub{font-size:11px;color:var(--text2);margin-top:2px}
.refresh-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px}
.rule-banner{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}
.rule-chip{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:10px 14px;min-width:80px;text-align:center;box-shadow:var(--shadow)}
.rule-chip .num{font-size:20px;font-weight:800}
.rule-chip .label{font-size:10px;color:var(--text2);margin-top:2px}
.stock-list{padding:12px 16px}
.card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .35s ease both}
.card-top{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 8px}
.card-left{display:flex;align-items:center;gap:10px}
.score-badge{width:44px;height:44px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.s-high{background:linear-gradient(135deg,#34c759,#30b350)}
.s-mid{background:linear-gradient(135deg,#ff9500,#e68a00)}
.s-low{background:linear-gradient(135deg,#86868b,#636366)}
.stock-name{font-size:15px;font-weight:700}
.stock-code{font-size:11px;color:var(--text2)}
.price-area{text-align:right}
.price{font-size:20px;font-weight:800}
.change{font-size:13px}
.up{color:var(--red)}.down{color:var(--green)}
.target-bar{display:flex;gap:8px;padding:8px 14px;border-top:1px solid rgba(0,0,0,.04)}
.target-item{flex:1;text-align:center;padding:6px;border-radius:8px;font-size:11px}
.target-item .tv{font-size:16px;font-weight:800}
.tg{background:rgba(52,199,89,.08);color:var(--green)}
.ts{background:rgba(255,59,48,.08);color:var(--red)}
.td{background:rgba(0,122,255,.08);color:var(--blue)}
.signals{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px}
.sig{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:500;background:rgba(0,122,255,.08);color:var(--blue);border:1px solid rgba(0,122,255,.15)}
.howto{padding:16px;margin:0 16px 12px;background:rgba(255,149,0,.06);border:1px solid rgba(255,149,0,.15);border-radius:12px;font-size:12px;line-height:1.7;color:var(--text2)}
.howto b{color:var(--text)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:0s}.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.3);padding:12px 20px;text-align:center;font-size:10px;color:var(--text2)}
.spacer{height:60px}
</style>
</head>
<body>

<div class="header">
  <h1>
    <span>⚡ 杀手策略</span>
    <button class="refresh-btn" onclick="load()">↻</button>
  </h1>
  <div class="sub" id="meta">7天目标+6% · 止损-4% · 14:30评分买入</div>
</div>

<div class="rule-banner" id="banner"></div>
<div class="stock-list" id="list"></div>

<div class="howto">
  <b>傻瓜式操作：</b><br>
  1. 看推荐，选1-2只顺眼的<br>
  2. 开盘买入，立刻挂条件单：<br>
  &nbsp;&nbsp;🟢 止盈: 买入价 × 1.06 → 赚6%自动卖<br>
  &nbsp;&nbsp;🔴 止损: 买入价 × 0.96 → 亏4%自动卖<br>
  3. 持有最多7天，第7天14:25没触发也卖掉<br>
  <b>纪律第一：止损到了就割，不加仓不扛单</b>
</div>

<div class="spacer"></div>
<div class="footer">JH 杀手策略 vK · 只做7天6% · 严格-4%止损</div>

<script>
async function load() {
  document.getElementById('list').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text2)">扫描全市场...</div>';
  try {
    var r = await fetch('data/recommendations.json?t=' + Date.now());
    var d = await r.json();
    var picks = (d && d.top_picks) || [];
    // 用killer评分重新筛选
    var scored = picks.map(function(s) {
      var ind = s.indicators || {};
      var sc = 10;
      var f = [];
      
      // gap/涨幅
      var ch = safeNum(s.change);
      if (ch >= 0.5 && ch <= 2.5) { sc += 15; f.push('高开'); }
      else if (ch > 2.5 && ch <= 4) { sc += 10; f.push('大幅高开'); }
      else if (ch >= 0 && ch < 0.5) { sc += 6; f.push('微涨'); }
      if (ch > 5 || ch < -3) sc = 0;
      
      var close = safeNum(s.price);
      if (close > 100 || close < 5) sc = 0;
      
      // ma5_dev
      var ma5 = safeNum(ind.ma5);
      if (ma5 > 0 && sc > 0) {
        var dev = (close/ma5 - 1) * 100;
        if (dev >= 1 && dev <= 5) { sc += 12; f.push('站均线'); }
        else if (dev > 5 && dev <= 8) { sc += 8; f.push('均线上'); }
        else if (dev >= 0 && dev < 1) { sc += 5; f.push('贴均线'); }
        else if (dev < -1) sc -= 5;
      }
      
      // vol_ratio
      var vr = safeNum(ind.vol_ratio);
      if (vr >= 1.5 && vr <= 4) { sc += 10; f.push('放量'); }
      else if (vr >= 1 && vr < 1.5) { sc += 4; f.push('温和'); }
      
      // mom5
      var m5 = safeNum(ind.mom_5d || s.alpha && s.alpha.mom_5d);
      if (m5 >= 3 && m5 <= 10) { sc += 10; f.push('有动量'); }
      else if (m5 >= 1 && m5 < 3) { sc += 4; f.push('微动量'); }
      if (m5 > 15 || m5 < -3) sc -= 4;
      
      sc = Math.min(Math.max(sc, 0), 95);
      return {stock: s, score: sc, signals: f};
    }).filter(function(x) { return x.score >= 35 && x.stock && safeNum(x.stock.price) > 0; })
     .sort(function(a, b) { return b.score - a.score; })
     .slice(0, 10);
    
    // Banner
    var tot = picks.length;
    document.getElementById('banner').innerHTML =
      '<div class="rule-chip"><div class="num" style="color:var(--blue)">' + tot + '</div><div class="label">扫描</div></div>' +
      '<div class="rule-chip"><div class="num" style="color:var(--green)">' + scored.length + '</div><div class="label">可操作</div></div>' +
      '<div class="rule-chip"><div class="num" style="color:var(--green)">+5%</div><div class="label">目标收益</div></div>' +
      '<div class="rule-chip"><div class="num" style="color:var(--red)">-3%</div><div class="label">止损线</div></div>' +
      '<div class="rule-chip"><div class="num" style="color:var(--orange)">3天</div><div class="label">持有期限</div></div>';
    
    if (!scored.length) {
      document.getElementById('list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);line-height:1.6">今日无符合杀手条件的股票<br>大盘不稳或没有合适标的<br>耐心等待，明天再扫</div>';
      return;
    }
    
    document.getElementById('list').innerHTML = scored.map(function(x) {
      var s = x.stock;
      var sc = x.score;
      var sigs = x.signals;
      var isUp = safeNum(s.change) >= 0;
      var sclass = sc >= 70 ? 's-high' : sc >= 50 ? 's-mid' : 's-low';
      return '<div class="card">' +
        '<div class="card-top">' +
          '<div class="card-left">' +
            '<div class="score-badge ' + sclass + '">' + sc.toFixed(0) + '</div>' +
            '<div><div class="stock-name">' + safe(s.name) + '</div><div class="stock-code">' + safe(s.code) + '</div></div>' +
          '</div>' +
          '<div class="price-area"><div class="price ' + (isUp?'up':'down') + '">' + safeFixed(s.price,2) + '</div><div class="change ' + (isUp?'up':'down') + '">' + (isUp?'+':'') + safeFixed(s.change,1) + '%</div></div>' +
        '</div>' +
        (sigs.length ? '<div class="signals">' + sigs.map(function(sig) { return '<span class="sig">' + sig + '</span>'; }).join('') + '</div>' : '') +
        '<div class="target-bar">' +
          '<div class="target-item tg"><div class="tv">+5%</div>止盈</div>' +
          '<div class="target-item ts"><div class="tv">-3%</div>止损</div>' +
          '<div class="target-item td"><div class="tv">3天</div>持有</div>' +
        '</div>' +
      '</div>';
    }).join('');
    
    document.getElementById('meta').textContent = '3天目标+5% · 止损-3% · 已扫描' + tot + '只 · 推荐' + scored.length + '只';
  } catch(e) {
    document.getElementById('list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">数据加载失败<br><span style="font-size:12px;color:var(--text2)">请先运行选股引擎</span></div>';
  }
}

function safe(v, d) { return (v === undefined || v === null || v === '' || v === 'undefined') ? (d || '--') : v; }
function safeNum(v, d) { var n = parseFloat(v); return isNaN(n) ? (d || 0) : n; }
function safeFixed(v, dec, d) { var n = parseFloat(v); return isNaN(n) ? (d || '--') : n.toFixed(dec); }

load();
</script>
</body>
</html>
