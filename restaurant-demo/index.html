<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>海鲜酒楼点单系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f2f2f7;--white:#fff;--blue:#007AFF;--blue-l:#E8F2FF;
  --green:#34C759;--green-l:#E8F8ED;--red:#FF3B30;--red-l:#FFE8E6;
  --orange:#FF9500;--orange-l:#FFF3E0;--purple:#AF52DE;--purple-l:#F3E8FF;
  --t1:#1C1C1E;--t2:#636366;--t3:#AEAEB2;--bd:#E5E5EA;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 8px 24px rgba(0,0,0,.12);
  --r:12px;--r2:16px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC",sans-serif;background:var(--bg);color:var(--t1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{background:var(--white);border-bottom:1px solid var(--bd);padding:10px 16px 0;flex-shrink:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),#5856D6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff}
.logo-text h1{font-size:16px;font-weight:600;line-height:1.2}
.logo-text span{font-size:10px;color:var(--t3)}
.hdr-right{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--t2)}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;margin-right:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;font-size:12px;font-weight:500;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:.2s;user-select:none}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px}
.view{display:none}.view.on{display:block}

/* Card */
.card{background:var(--white);border-radius:var(--r2);padding:14px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid var(--bd)}

/* Tables */
.flr{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.flr::before{content:'';width:3px;height:14px;background:var(--blue);border-radius:2px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin-bottom:18px}
.tc{background:var(--white);border-radius:var(--r);padding:10px 6px;text-align:center;cursor:pointer;transition:.2s;border:2px solid transparent}
.tc:active{transform:scale(.96)}
.tc.idle{border-color:var(--green);background:var(--green-l)}
.tc.dining{border-color:var(--orange);background:var(--orange-l)}
.tc.reserved{border-color:var(--purple);background:var(--purple-l)}
.tc.cleaning{border-color:var(--t3);background:#f5f5f5}
.tc .tn{font-size:17px;font-weight:700}
.tc.idle .tn{color:#1B8D4A}.tc.dining .tn{color:#CC7600}.tc.reserved .tn{color:var(--purple)}
.tc .cap{font-size:10px;color:var(--t2);margin-top:1px}
.tc .st{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px;color:#fff}
.tc.idle .st{background:var(--green)}.tc.dining .st{background:var(--orange)}.tc.reserved .st{background:var(--purple)}.tc.cleaning .st{background:var(--t3)}
.tc .amt{font-size:10px;color:var(--t2);margin-top:2px}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.lg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.lg-d{width:9px;height:9px;border-radius:3px}
.sr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sb{flex:1;min-width:60px;background:var(--white);border-radius:var(--r);padding:10px;text-align:center;border:1px solid var(--bd)}
.sb .n{font-size:22px;font-weight:700;color:var(--blue)}
.sb .l{font-size:10px;color:var(--t3);margin-top:1px}

/* Order */
.oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.oi{display:flex;align-items:center;gap:8px}
.otag{background:var(--blue);color:#fff;padding:4px 10px;border-radius:7px;font-weight:600;font-size:13px}
.oid{font-size:11px;color:var(--t2)}
.sbox{position:relative;width:180px}
.sbox input{width:100%;padding:7px 10px 7px 28px;border:1px solid var(--bd);border-radius:7px;font-size:12px;outline:none;background:var(--bg)}
.sbox input:focus{border-color:var(--blue)}
.sbox::before{content:"🔍";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px}
.ml{display:flex;gap:14px}
.cs{width:72px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 200px);-webkit-overflow-scrolling:touch}
.cb{width:100%;padding:10px 4px;text-align:center;font-size:11px;color:var(--t2);background:var(--bg);border:none;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:.2s}
.cb.on{background:var(--blue);color:#fff;font-weight:600}
.ma{flex:1;min-width:0}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.dc{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.dc:active{transform:scale(.97)}.dc.clr{opacity:.35;pointer-events:none}.dc.ic{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
.de{height:68px;background:linear-gradient(135deg,#f8f9fa,#e9ecef);display:flex;align-items:center;justify-content:center;font-size:32px}
.di{padding:8px}
.dn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.dp{font-size:13px;font-weight:700;color:var(--red)}.dp .du{font-size:10px;color:var(--t3);font-weight:400}
.ds{font-size:9px;color:var(--t3);background:var(--bg);padding:1px 5px;border-radius:3px}
.db{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;color:#fff}
.db.clr-b{background:var(--red)}.db.wg-b{background:var(--orange)}

/* Cart */
.cpn{width:240px;flex-shrink:0;background:var(--white);border-radius:var(--r2);border:1px solid var(--bd);display:flex;flex-direction:column;max-height:calc(100vh - 200px)}
.ch{padding:12px;border-bottom:1px solid var(--bd);font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.cc{background:var(--blue);color:#fff;font-size:10px;padding:2px 7px;border-radius:9px}
.ci{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}
.ce{text-align:center;padding:36px 14px;color:var(--t3);font-size:12px;line-height:1.8}
.cit{display:flex;align-items:center;gap:7px;padding:8px;border-bottom:1px solid #f5f5f5}
.cit:last-child{border-bottom:none}
.cit-e{font-size:20px;width:28px;text-align:center}
.cit-i{flex:1;min-width:0}
.cit-n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cit-p{font-size:10px;color:var(--t2)}
.cit-a{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qb{width:24px;height:24px;border-radius:50%;border:1px solid var(--bd);background:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.qb:active{transform:scale(.9)}.qb.rm{border-color:var(--red);color:var(--red)}
.qn{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.cf{padding:10px 12px;border-top:1px solid var(--bd);background:var(--bg);border-radius:0 0 var(--r2) var(--r2)}
.ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ctl{font-size:12px;color:var(--t2)}.cta{font-size:18px;font-weight:700;color:var(--red)}
.sub-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.sub-btn:active{transform:scale(.98)}.sub-btn:disabled{background:var(--t3)}

/* Checkout */
.co-s{max-width:440px;margin:0 auto}
.co-hdr{text-align:center;padding:18px;background:linear-gradient(135deg,var(--blue),#5856D6);color:#fff;border-radius:var(--r2);margin-bottom:18px}
.co-tn{font-size:32px;font-weight:800;margin-bottom:3px}
.co-sub{font-size:12px;opacity:.8}
.co-it .ci2{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.co-it .ci2:last-child{border-bottom:none}
.ci2-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ci2-e{font-size:18px}.ci2-n{font-size:13px}.ci2-p{font-size:13px;font-weight:600;flex-shrink:0}
.co-total{background:linear-gradient(135deg,#1C1C1E,#2C2C2E);color:#fff;border-radius:var(--r2);padding:18px;margin:14px 0}
.co-tl{display:flex;justify-content:space-between;align-items:center}
.co-tll{font-size:12px;opacity:.7}.co-tla{font-size:26px;font-weight:800}
.pms{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}
.pm{padding:14px;border-radius:var(--r);border:2px solid var(--bd);background:var(--white);text-align:center;cursor:pointer;transition:.2s}
.pm:active{transform:scale(.97)}.pm.sel{border-color:var(--blue);background:var(--blue-l)}
.pm-i{font-size:22px;margin-bottom:3px}.pm-l{font-size:12px;font-weight:500}
.set-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:2px}
.set-btn:active{transform:scale(.98)}

/* KDS */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.kc{background:var(--white);border-radius:var(--r2);border:1px solid var(--bd);overflow:hidden;transition:.3s}
.kc.rush{border-color:var(--red);animation:rf 1s infinite}
@keyframes rf{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(255,59,48,.35)}}
.kch{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f5f5f5}
.kt{font-size:16px;font-weight:700;color:var(--blue)}.ktm{font-size:11px;color:var(--t2)}
.kitems{padding:6px 12px}
.kd{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8f8f8}
.kd:last-child{border-bottom:none}
.kdn{font-size:14px;font-weight:600}.kdd{font-size:10px;color:var(--t3);margin-top:1px}
.kdq{font-size:16px;font-weight:700;color:var(--red);background:var(--red-l);width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kb{display:flex;gap:5px;padding:8px 12px;border-top:1px solid #f5f5f5}
.kbtn{flex:1;padding:7px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.kbtn:active{transform:scale(.96)}
.kbtn.st{background:var(--blue);color:#fff}.kbtn.rd{background:var(--green);color:#fff}.kbtn.dn{background:var(--t3);color:#fff}.kbtn.ru{background:var(--red);color:#fff}
.kel{font-size:10px;color:var(--orange);font-weight:500}

/* Seafood */
.sfg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.sfc{background:var(--white);border-radius:var(--r);border:2px solid var(--bd);padding:12px;text-align:center;cursor:pointer;transition:.2s}
.sfc:active{transform:scale(.97)}.sfc.sel{border-color:var(--blue);background:var(--blue-l)}
.sfe{font-size:28px;margin-bottom:4px}.sfn{font-size:13px;font-weight:600}.sfp{font-size:12px;color:var(--red);margin-top:1px}.sfs{font-size:10px;color:var(--t3);margin-top:1px}
.sfp2{background:var(--white);border-radius:var(--r2);border:1px solid var(--bd);padding:18px;margin-bottom:14px}
.sfw{text-align:center;padding:18px;background:var(--bg);border-radius:var(--r);margin-bottom:14px}
.wv{font-size:44px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums}
.wu{font-size:14px;color:var(--t2);margin-left:3px}
.wa{font-size:18px;font-weight:700;color:var(--red);margin-top:3px}
.sfar{display:flex;gap:8px;margin-top:10px}
.sfab{flex:1;padding:11px;border-radius:var(--r);border:1px solid var(--bd);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:.15s}
.sfab:active{transform:scale(.97)}.sfab.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.kk{padding:12px;background:var(--white);border:1px solid var(--bd);border-radius:9px;font-size:16px;font-weight:600;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.kk:active{transform:scale(.95);background:var(--bg)}.kk.act{background:var(--blue);color:#fff;border-color:var(--blue)}.kk.dng{background:var(--red);color:#fff;border-color:var(--red)}
.sfh{margin-top:14px}
.shi{display:flex;align-items:center;gap:10px;padding:10px;background:var(--white);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:6px}
.she{font-size:20px}.shi-i{flex:1}.shin{font-size:13px;font-weight:600}.shid{font-size:11px;color:var(--t2)}.shia{font-size:14px;font-weight:700;color:var(--red)}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-16px);background:#1C1C1E;color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-mask.show{opacity:1;pointer-events:auto}
.modal{background:var(--white);border-radius:var(--r2) var(--r2) 0 0;width:100%;max-width:480px;max-height:80vh;overflow:auto;padding:20px;transform:translateY(100%);transition:.3s}
.modal-mask.show .modal{transform:translateY(0)}
.modal h3{font-size:16px;margin-bottom:14px;text-align:center}
.taste-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.taste-b{padding:10px;border:2px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer;font-size:13px;transition:.2s}
.taste-b:active{transform:scale(.96)}.taste-b.sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600}

@media(max-width:600px){
  .ml{flex-direction:column}.cs{width:100%;max-height:none;display:flex;overflow-x:auto;gap:3px;padding-bottom:6px}
  .cb{min-width:50px;padding:7px 8px;margin-bottom:0}.cpn{width:100%;max-height:260px}
  .dg{grid-template-columns:repeat(auto-fill,minmax(115px,1fr))}.kg{grid-template-columns:1fr}
  .sbox{width:100%}.sfg{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
</style>
</head>

  <div class="toast" id="toast"></div>
  <div class="modal-mask" id="tasteModal">
    <div class="modal">
      <h3 id="tasteTitle">选择口味做法</h3>
      <div class="taste-g" id="tasteGrid"></div>
      <div style="display:flex;gap:8px">

        <button class="sfab pri" onclick="confirmTaste()" style="flex:1">确认</button>

  <div class="header">
    <div class="hdr-top">

  </div>
  <div class="main" id="main"></div>
</div>

// ========== RENDER ==========
function render(){
  var m=document.getElementById('main');
  switch(S.view){
    case 'tables': m.innerHTML=rTables(); break;
    case 'order': m.innerHTML=rOrder(); break;
    case 'checkout': m.innerHTML=rCheckout(); break;
    case 'kds': m.innerHTML=rKDS(); break;
    case 'seafood': m.innerHTML=rSeafood(); break;
    case 'report': m.innerHTML=rReport(); break;
  }
}

function rTables(){
  var sl={idle:'空闲',dining:'就餐中',reserved:'已预定',cleaning:'清理中'};
  var t1=S.tables.filter(function(t){return t.area==='一楼'});
  var t2=S.tables.filter(function(t){return t.area==='二楼'});
  var sm={total:S.tables.length,idle:0,dining:0,reserved:0,cleaning:0};
  S.tables.forEach(function(t){sm[t.status]++});
  var h='<div class="sr">';
  h+='<div class="sb"><div class="n">'+sm.total+'</div><div class="l">总桌数</div></div>';
  h+='<div class="sb"><div class="n" style="color:var(--green)">'+sm.idle+'</div><div class="l">空闲</div></div>';
  h+='<div class="sb"><div class="n" style="color:var(--orange)">'+sm.dining+'</div><div class="l">就餐中</div></div>';

// ========== ACTIONS ==========
function switchView(v){
  S.view=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.v===v)});
  render();
}
document.getElementById('tabs').addEventListener('click',function(e){
  var t=e.target.closest('.tab');
  if(t)switchView(t.dataset.v);
});

function selectTable(no){
  var t=S.tables.find(function(x){return x.no===no});
  if(!t)return;
  S.currentTable=t;
  if(t.status==='idle'){
    S.cart=[];S.searchText='';switchView('order');
    toast('已选桌 '+no+'，开始点餐');
  }else if(t.status==='dining'){
    switchView('checkout');
    toast('桌 '+no+' 消费 ¥'+t.amount);
  }else{
    toast('桌 '+no+' 当前：'+({idle:'空闲',dining:'就餐中',reserved:'已预定',cleaning:'清理中'})[t.status]);
  }
}

function getCartQty(did){
  var f=S.cart.find(function(c){return c.did===did});
  return f?f.q:0;
}
function cartCount(){var c=0;S.cart.forEach(function(i){c+=i.q});return c}
function cartTotal(){var t=0;S.cart.forEach(function(i){t+=i.p*i.q});return t}

function addToCart(did){
  var d=S.menu.find(function(x){return x.id===did});
  if(!d||d.clr)return;
  if(!S.currentTable){toast('请先在桌位页选择餐桌');return}
  // If dish has multiple tastes, show modal
  if(d.tastes&&d.tastes.length>1){
    pendingTasteDish=d;
    showTasteModal(d);
    return;
  }
  doAddToCart(d,d.tastes?d.tastes[0]:'');
}

function showTasteModal(d){
  document.getElementById('tasteTitle').textContent='选择口味 · '+d.n;
  var g=document.getElementById('tasteGrid');
  g.innerHTML='';
  d.tastes.forEach(function(t,i){
    var b=document.createElement('div');
    b.className='taste-b'+(i===0?' sel':'');
    b.textContent=t;
    b.onclick=function(){
      g.querySelectorAll('.taste-b').forEach(function(x){x.classList.remove('sel')});
      b.classList.add('sel');
    };
    g.appendChild(b);
  });
  document.getElementById('tasteModal').classList.add('show');
}
function closeTaste(){document.getElementById('tasteModal').classList.remove('show');pendingTasteDish=null}
function confirmTaste(){
  if(!pendingTasteDish){closeTaste();return}
  var sel=document.querySelector('.taste-b.sel');
  var taste=sel?sel.textContent:pendingTasteDish.tastes[0];
  doAddToCart(pendingTasteDish,taste);
  closeTaste();
}

function doAddToCart(d,taste){
  var ex=S.cart.find(function(c){return c.did===d.id&&c.taste===taste});
  if(ex){ex.q++}
  else{S.cart.push({id:S.nextCid++,did:d.id,e:d.e,n:d.n,p:d.p,q:1,taste:taste})}
  render();
}

function removeFromCart(id){
  var i=S.cart.findIndex(function(c){return c.id===id});
  if(i>=0)S.cart.splice(i,1);
  render();
}
function chgQty(id,d){
  var it=S.cart.find(function(c){return c.id===id});
  if(it){it.q+=d;if(it.q<=0)removeFromCart(id);else render()}
}

function submitOrder(){
  if(!S.cart.length)return;
  if(!S.currentTable){toast('请先选择餐桌');return}
  var t=S.currentTable;
  t.status='dining';t.people=4;t.amount=cartTotal();
  t.items=S.cart.map(function(c){return{e:c.e,n:c.n,p:c.p,q:c.q,s:'默认',t:c.taste||'',r:''}});
  S.kds.unshift({
    id:Date.now(),t:t.no,st:'queued',time:curTime(),el:'',rush:0,
    items:S.cart.map(function(c){return{e:c.e,n:c.n,taste:c.taste||'默认',r:'',q:c.q}})
  });
  toast('✅ 订单已提交！桌 '+t.no+' ¥'+cartTotal().toFixed(2));
  S.cart=[];switchView('kds');
}

function doSettle(){
  var t=S.currentTable;
  if(!t)return;
  t.status='cleaning';t.amount=0;t.items=[];t.people=0;
  var lb={wechat:'微信',alipay:'支付宝',cash:'现金',card:'刷卡'};
  toast('✅ 结账成功！桌 '+t.no+' ('+lb[S.payMethod]+')');
  S.currentTable=null;switchView('tables');
}

function kdsUpdate(id,st){
  var o=S.kds.find(function(x){return x.id===id});
  if(!o)return;
  if(st==='done'){
    var i=S.kds.findIndex(function(x){return x.id===id});
    if(i>=0)S.kds.splice(i,1);
    toast('✅ 桌 '+o.t+' 已传菜');
  }else{o.st=st;if(st==='preparing')o.el='00:00'}
  render();
}
function kdsRush(id){
  var o=S.kds.find(function(x){return x.id===id});
  if(o){o.rush=1;playRushSound();toast('🔔 桌 '+o.t+' 已催菜！');render()}
}

function selectSpecies(id){
  S.selectedSp=S.species.find(function(x){return x.id===id});
  S.wVal='';render();
}
function wInput(c){
  if(c==='.'&&S.wVal.indexOf('.')>=0)return;
  if(S.wVal.length>=6)return;
  S.wVal+=c;render();
}
function confirmWeigh(){
  if(!S.selectedSp||!S.wVal||parseFloat(S.wVal)<=0){toast('请选择品种并输入重量');return}
  var w=parseFloat(S.wVal),sp=S.selectedSp,amt=w*sp.p;
  S.sfHistory.unshift({id:Date.now(),e:sp.e,n:sp.n,w:w,p:sp.p,amt:amt});
  toast('✅ '+sp.n+' '+w+'斤 = ¥'+amt.toFixed(2));
  S.wVal='';render();
}

// ========== REPORT ==========

  h+='<div style="font-size:13px;opacity:.7;margin-bottom:4px">营业日期</div>';

  h+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">';

  h+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:800;color:var(--green)">'+people+'</div><div style="font-size:12px;color:var(--t3)">就餐人数</div></div>';

  pays.forEach(function(p){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    h+='<div style="width:70px;font-size:12px;color:var(--t2)">'+p.l+'</div>';
    h+='<div style="flex:1;height:20px;background:var(--bg);border-radius:10px;overflow:hidden"><div style="height:100%;width:'+p.pct+';background:'+p.c+';border-radius:10px;transition:width .5s"></div></div>';
    h+='<div style="width:80px;text-align:right;font-size:13px;font-weight:600">¥'+p.v.toFixed(0)+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // Top dishes
  h+='<div class="card"><h3 style="font-size:14px;margin-bottom:12px">🏆 热销菜品 TOP5</h3>';
  var tops=[
    {n:'清蒸石斑',cnt:18,amt:3384},{n:'蒜蓉蒸龙虾',cnt:12,amt:3216},
    {n:'椒盐皮皮虾',cnt:15,amt:1320},{n:'姜葱花蟹',cnt:10,amt:1280},
    {n:'青岛啤酒',cnt:45,amt:450}
  ];
  tops.forEach(function(t,i){
    var medal=['🥇','🥈','🥉','4.','5.'][i];

    h+='<span style="font-size:16px">'+medal+'</span>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+t.n+'</div><div style="font-size:11px;color:var(--t3)">'+t.cnt+'份</div></div>';

  h+='<button class="sfab pri" style="flex:1;padding:14px" onclick="doDailySettle()">✓ 执行日结</button>';

  return h;
}

function doDailySettle(){
  toast('✅ 日结完成！已生成营业报表');
}

// ========== SOUND ==========
function playRushSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var notes=[880,1100,880];
    notes.forEach(function(freq,i){
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='square';
      gain.gain.value=0.08;
      osc.start(ctx.currentTime+i*0.15);
      osc.stop(ctx.currentTime+i*0.15+0.12);
    });
  }catch(e){}
}

// ========== OFFLINE SIM ==========
var isOffline=false;
function toggleOffline(){
  isOffline=!isOffline;
  var dot=document.querySelector('.dot');
  var statusText=document.querySelector('.hdr-right span:first-child');
  if(isOffline){
    dot.style.background='var(--red)';
    dot.style.animation='none';
    toast('⚠️ 网络已断开 · 离线模式');
  }else{
    dot.style.background='var(--green)';
    dot.style.animation='pulse 2s infinite';
    toast('✅ 网络已恢复 · 同步中...');
  }
}

// ========== UTILS ==========
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show')},2200);
}
function curTime(){
  var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
}
function updateClock(){document.getElementById('clock').textContent=curTime()}

// ========== INIT ==========
updateClock();setInterval(updateClock,30000);
render();
</script>
