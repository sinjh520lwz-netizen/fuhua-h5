<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>天气卡片 - iOS18风格</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
  background: #0a0a1a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
}

.title {
  text-align: center;
  color: white;
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 30px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* ═══ Weather Cards Grid ═══ */
.weather-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* ═══ Card Base ═══ */
.weather-card {
  position: relative;
  height: 200px;
  border-radius: 24px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
}

.weather-card:active {
  transform: scale(0.95);
}

.weather-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1;
}

.card-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.card-content {
  position: relative;
  z-index: 10;
  padding: 20px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  color: white;
}

.card-icon {
  font-size: 40px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.card-temp {
  font-size: 36px;
  font-weight: 200;
  line-height: 1;
  letter-spacing: -1px;
}

.card-desc {
  font-size: 14px;
  opacity: 0.9;
  margin-top: 4px;
}

.card-detail {
  font-size: 12px;
  opacity: 0.7;
}

/* ═══ Card Themes ═══ */
.card-sunny {
  background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
  box-shadow: 0 8px 32px rgba(253, 160, 133, 0.4);
}

.card-windy {
  background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
  box-shadow: 0 8px 32px rgba(161, 196, 253, 0.4);
}

.card-rainy {
  background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  box-shadow: 0 8px 32px rgba(79, 172, 254, 0.4);
}

.card-snowy {
  background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%);
  box-shadow: 0 8px 32px rgba(230, 233, 240, 0.4);
}

/* ═══ Active State ═══ */
.weather-card.active {
  transform: scale(1.02);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

/* ═══ Controls ═══ */
.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 30px;
}

.btn {
  padding: 10px 20px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.btn:hover {
  background: rgba(255,255,255,0.25);
}

.btn.active {
  background: rgba(255,255,255,0.3);
  border-color: rgba(255,255,255,0.5);
}

/* ═══ Responsive ═══ */
@media (max-width: 360px) {
  .weather-grid {
    grid-template-columns: 1fr;
  }
  .weather-card {
    height: 160px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="title">🌤️ 天气卡片</div>
  
  <div class="weather-grid">
    <!-- Sunny Card -->
    <div class="weather-card card-sunny active" data-weather="sunny">
      <canvas class="card-canvas" id="canvas-sunny"></canvas>
      <div class="card-content">
        <div class="card-icon">☀️</div>
        <div>
          <div class="card-temp">28°</div>
          <div class="card-desc">晴天</div>
          <div class="card-detail">紫外线强</div>
        </div>
      </div>
    </div>

    <!-- Windy Card -->
    <div class="weather-card card-windy" data-weather="windy">
      <canvas class="card-canvas" id="canvas-windy"></canvas>
      <div class="card-content">
        <div class="card-icon">💨</div>
        <div>
          <div class="card-temp">22°</div>
          <div class="card-desc">大风</div>
          <div class="card-detail">风速 25km/h</div>
        </div>
      </div>
    </div>

    <!-- Rainy Card -->
    <div class="weather-card card-rainy" data-weather="rainy">
      <canvas class="card-canvas" id="canvas-rainy"></canvas>
      <div class="card-content">
        <div class="card-icon">🌧️</div>
        <div>
          <div class="card-temp">18°</div>
          <div class="card-desc">暴雨</div>
          <div class="card-detail">降水概率 90%</div>
        </div>
      </div>
    </div>

    <!-- Snowy Card -->
    <div class="weather-card card-snowy" data-weather="snowy">
      <canvas class="card-canvas" id="canvas-snowy"></canvas>
      <div class="card-content">
        <div class="card-icon">❄️</div>
        <div>
          <div class="card-temp">-5°</div>
          <div class="card-desc">暴雪</div>
          <div class="card-detail">积雪 15cm</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn active" onclick="switchWeather('sunny')">☀️ 晴天</button>
    <button class="btn" onclick="switchWeather('windy')">💨 大风</button>
    <button class="btn" onclick="switchWeather('rainy')">🌧️ 暴雨</button>
    <button class="btn" onclick="switchWeather('snowy')">❄️ 暴雪</button>
  </div>
</div>

<script>
/* ═══ Weather Animations ═══ */

class WeatherAnimation {
  constructor(canvas, type) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.type = type;
    this.particles = [];
    this.time = 0;
    this.animFrame = null;
    
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.init();
    this.animate();
  }
  
  resize() {
    this.canvas.width = this.canvas.offsetWidth * 2;
    this.canvas.height = this.canvas.offsetHeight * 2;
    this.ctx.scale(2, 2);
    this.width = this.canvas.offsetWidth;
    this.height = this.canvas.offsetHeight;
  }
  
  init() {
    this.particles = [];
    
    switch(this.type) {
      case 'sunny':
        this.initSunny();
        break;
      case 'windy':
        this.initWindy();
        break;
      case 'rainy':
        this.initRainy();
        break;
      case 'snowy':
        this.initSnowy();
        break;
    }
  }
  
  initSunny() {
    // Sun rays
    for (let i = 0; i < 8; i++) {
      this.particles.push({
        angle: (Math.PI * 2 / 8) * i,
        length: 40 + Math.random() * 20,
        speed: 0.02
      });
    }
  }
  
  initWindy() {
    // Clouds and wind lines
    for (let i = 0; i < 5; i++) {
      this.particles.push({
        x: Math.random() * this.width,
        y: 20 + Math.random() * 60,
        size: 20 + Math.random() * 30,
        speed: 1 + Math.random() * 2
      });
    }
    // Wind lines
    for (let i = 0; i < 10; i++) {
      this.particles.push({
        x: Math.random() * this.width,
        y: 80 + Math.random() * 80,
        length: 30 + Math.random() * 50,
        speed: 3 + Math.random() * 3,
        type: 'line'
      });
    }
  }
  
  initRainy() {
    // Raindrops
    for (let i = 0; i < 50; i++) {
      this.particles.push({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        length: 10 + Math.random() * 15,
        speed: 5 + Math.random() * 5,
        opacity: 0.3 + Math.random() * 0.5
      });
    }
  }
  
  initSnowy() {
    // Snowflakes
    for (let i = 0; i < 40; i++) {
      this.particles.push({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        size: 2 + Math.random() * 4,
        speed: 0.5 + Math.random() * 1.5,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.03
      });
    }
  }
  
  animate() {
    this.time += 0.016;
    this.ctx.clearRect(0, 0, this.width, this.height);
    
    switch(this.type) {
      case 'sunny':
        this.drawSunny();
        break;
      case 'windy':
        this.drawWindy();
        break;
      case 'rainy':
        this.drawRainy();
        break;
      case 'snowy':
        this.drawSnowy();
        break;
    }
    
    this.animFrame = requestAnimationFrame(() => this.animate());
  }
  
  drawSunny() {
    const cx = this.width / 2;
    const cy = this.height / 2;
    
    // Glow
    const gradient = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
    gradient.addColorStop(0, 'rgba(255, 200, 50, 0.6)');
    gradient.addColorStop(0.5, 'rgba(255, 200, 50, 0.2)');
    gradient.addColorStop(1, 'rgba(255, 200, 50, 0)');
    this.ctx.fillStyle = gradient;
    this.ctx.fillRect(0, 0, this.width, this.height);
    
    // Rays
    this.ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
    this.ctx.lineWidth = 2;
    this.particles.forEach(p => {
      if (p.angle !== undefined) {
        p.angle += p.speed;
        const x1 = cx + Math.cos(p.angle) * 30;
        const y1 = cy + Math.sin(p.angle) * 30;
        const x2 = cx + Math.cos(p.angle) * p.length;
        const y2 = cy + Math.sin(p.angle) * p.length;
        
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);
        this.ctx.lineTo(x2, y2);
        this.ctx.stroke();
      }
    });
  }
  
  drawWindy() {
    // Clouds
    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    this.particles.forEach(p => {
      if (p.type !== 'line') {
        p.x += p.speed;
        if (p.x > this.width + p.size) p.x = -p.size;
        
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        this.ctx.fill();
      }
    });
    
    // Wind lines
    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    this.ctx.lineWidth = 1;
    this.particles.forEach(p => {
      if (p.type === 'line') {
        p.x += p.speed;
        if (p.x > this.width + p.length) p.x = -p.length;
        
        this.ctx.beginPath();
        this.ctx.moveTo(p.x, p.y);
        this.ctx.lineTo(p.x + p.length, p.y);
        this.ctx.stroke();
      }
    });
  }
  
  drawRainy() {
    this.ctx.strokeStyle = 'rgba(200, 220, 255, 0.6)';
    this.ctx.lineWidth = 1;
    
    this.particles.forEach(p => {
      p.y += p.speed;
      p.x += p.speed * 0.3;
      
      if (p.y > this.height) {
        p.y = -p.length;
        p.x = Math.random() * this.width;
      }
      
      this.ctx.globalAlpha = p.opacity;
      this.ctx.beginPath();
      this.ctx.moveTo(p.x, p.y);
      this.ctx.lineTo(p.x + p.speed * 0.3, p.y + p.length);
      this.ctx.stroke();
    });
    this.ctx.globalAlpha = 1;
    
    // Lightning flash
    if (Math.random() < 0.005) {
      this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      this.ctx.fillRect(0, 0, this.width, this.height);
    }
  }
  
  drawSnowy() {
    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    
    this.particles.forEach(p => {
      p.y += p.speed;
      p.wobble += p.wobbleSpeed;
      p.x += Math.sin(p.wobble) * 0.5;
      
      if (p.y > this.height + p.size) {
        p.y = -p.size;
        p.x = Math.random() * this.width;
      }
      
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      this.ctx.fill();
    });
    
    // Snow accumulation at bottom
    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
    this.ctx.fillRect(0, this.height - 10, this.width, 10);
  }
  
  destroy() {
    cancelAnimationFrame(this.animFrame);
  }
}

/* ═══ Initialize Animations ═══ */
const animations = {};

function initAnimations() {
  const types = ['sunny', 'windy', 'rainy', 'snowy'];
  types.forEach(type => {
    const canvas = document.getElementById(`canvas-${type}`);
    if (canvas) {
      animations[type] = new WeatherAnimation(canvas, type);
    }
  });
}

/* ═══ Switch Weather ═══ */
function switchWeather(type) {
  // Update cards
  document.querySelectorAll('.weather-card').forEach(card => {
    card.classList.toggle('active', card.dataset.weather === type);
  });
  
  // Update buttons
  document.querySelectorAll('.btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(
      type === 'sunny' ? '晴天' :
      type === 'windy' ? '大风' :
      type === 'rainy' ? '暴雨' : '暴雪'
    ));
  });
}

/* ═══ Card Click Handler ═══ */
document.querySelectorAll('.weather-card').forEach(card => {
  card.addEventListener('click', () => {
    switchWeather(card.dataset.weather);
  });
});

/* ═══ Start ═══ */
window.addEventListener('load', initAnimations);
</script>
</body>
</html>
